<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语口语练习</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--white:#fff;
  --blue:#1a6fc4;--blue-dark:#0f4f8f;--blue-light:#e8f1fb;
  --teal:#0a7c4f;--teal-light:#e6f5ee;
  --amber:#854F0B;--amber-light:#faeeda;
  --coral:#993C1D;--coral-light:#faece7;
  --purple:#534AB7;--purple-light:#eeedfe;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e8e5e0;
  --r:14px;--r-lg:20px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 底部导航 ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;gap:2px;transition:opacity .15s;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:11px;color:var(--text3);}
.tab-item.active .tab-label{color:var(--blue);font-weight:500;}

/* ── 页面 ── */
.page{display:none;flex-direction:column;min-height:100vh;padding-bottom:60px;}
.page.active{display:flex;}
.page-header{background:var(--white);padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.page-title{font-size:20px;font-weight:700;color:var(--text);}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.page-body{flex:1;padding:14px;overflow-y:auto;}

/* ── 通用 ── */
.card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;}
.btn{padding:10px 18px;border-radius:var(--r);border:none;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:6px 14px;font-size:13px;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.tag-food{background:var(--amber-light);color:var(--amber);}
.tag-travel{background:var(--blue-light);color:var(--blue);}
.tag-daily{background:var(--purple-light);color:var(--purple);}
.tag-health{background:var(--coral-light);color:var(--coral);}
.tag-finance{background:var(--teal-light);color:var(--teal);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}

/* ── 口语练习页 ── */
.level-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.level-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.level-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.level-desc{background:var(--blue-light);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--blue-dark);line-height:1.6;}
.speak-scene-list{display:flex;flex-direction:column;gap:8px;}
.speak-scene-card{background:var(--white);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .1s;}
.speak-scene-card:active{transform:scale(.97);}
.speak-scene-icon{font-size:28px;flex-shrink:0;}
.speak-scene-info{flex:1;}
.speak-scene-name{font-size:15px;font-weight:600;}
.speak-scene-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.speak-scene-arrow{color:var(--text3);font-size:18px;}

/* ── 对话屏幕（全屏覆盖）── */
#chat-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;}
#chat-screen.open{display:flex;}
.chat-nav{background:var(--white);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-back{font-size:22px;cursor:pointer;color:var(--text2);padding:4px 6px;}
.chat-nav-title{flex:1;font-size:15px;font-weight:600;}
.chat-level-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--blue-light);color:var(--blue);font-weight:500;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.bubble{max-width:80%;padding:11px 15px;font-size:15px;line-height:1.6;border-radius:18px;word-break:break-word;animation:pop .2s ease;}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.bubble.ai{background:var(--white);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.bubble.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.bubble.sys{background:var(--teal-light);color:var(--teal);align-self:center;font-size:13px;text-align:center;max-width:88%;border-radius:10px;padding:7px 14px;}
.bubble.err{background:var(--amber-light);color:var(--amber);align-self:center;font-size:13px;text-align:center;max-width:88%;border-radius:10px;padding:7px 14px;}
.chat-bottom{flex-shrink:0;background:var(--white);border-top:1px solid var(--border);padding:16px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.chat-status{font-size:14px;color:var(--text2);height:22px;text-align:center;}
.mic-wrap{position:relative;}
.mic-big{width:76px;height:76px;border-radius:50%;border:none;cursor:pointer;font-size:34px;display:flex;align-items:center;justify-content:center;background:var(--blue);box-shadow:0 4px 18px rgba(26,111,196,.35);transition:all .2s;}
.mic-big:active{transform:scale(.92);}
.mic-big.disabled{background:#ccc;box-shadow:none;cursor:default;}
.mic-big.listening{background:#e24b4a;box-shadow:0 4px 18px rgba(226,75,74,.35);animation:pulse 1.1s ease-in-out infinite;}
.mic-big.speaking{background:var(--teal);box-shadow:0 4px 18px rgba(10,124,79,.35);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.chat-hint{font-size:12px;color:var(--text3);}
.chat-end-btn{font-size:13px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:20px;padding:6px 18px;cursor:pointer;font-family:inherit;}

/* ── 结果屏幕 ── */
#result-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow-y:auto;}
#result-screen.open{display:flex;}
.result-top{background:var(--white);padding:24px 16px 20px;text-align:center;border-bottom:1px solid var(--border);}
.result-emoji{font-size:52px;margin-bottom:8px;}
.result-title{font-size:22px;font-weight:700;}
.result-scene{font-size:14px;color:var(--text2);margin-top:4px;}
.result-body{padding:14px;padding-bottom:30px;}
.score-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.score-num{font-size:60px;font-weight:700;color:var(--blue);line-height:1;}
.score-right{}
.score-lbl{font-size:13px;color:var(--text2);}
.score-badge{display:inline-block;margin-top:5px;font-size:13px;padding:4px 12px;border-radius:20px;background:var(--blue-light);color:var(--blue);font-weight:500;}
.bars{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-name{font-size:13px;color:var(--text2);width:46px;flex-shrink:0;}
.bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .8s ease;}
.bar-val{font-size:13px;color:var(--text2);width:26px;text-align:right;flex-shrink:0;}
.gold-phrases{background:var(--amber-light);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.gold-title{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px;}
.gold-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(133,79,11,.1);}
.gold-item:last-child{border-bottom:none;}
.gold-en{font-size:14px;font-weight:500;flex:1;}
.gold-cn{font-size:12px;color:var(--amber);margin-top:2px;}
.gold-save{font-size:18px;cursor:pointer;color:var(--amber);opacity:.6;flex-shrink:0;}
.gold-save:hover{opacity:1;}
.feedback-box{background:var(--white);border-radius:var(--r);padding:14px;margin-bottom:10px;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.encourage-box{background:var(--teal-light);border-radius:var(--r);padding:14px;margin-bottom:14px;font-size:14px;color:var(--teal);line-height:1.7;}
.result-btns{display:flex;gap:8px;}
.result-btns .btn{flex:1;padding:13px;}

/* ── 场景练习页 ── */
.scene-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.scene-card{background:var(--white);border-radius:var(--r);padding:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .1s;}
.scene-card:active{transform:scale(.96);}
.scene-emoji{font-size:26px;margin-bottom:6px;}
.scene-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.scene-desc{font-size:11px;color:var(--text2);line-height:1.4;}

/* ── 词句库页 ── */
.topic-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.topic-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.topic-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.phrase-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;}
.phrase-item:last-child{border-bottom:none;}
.phrase-en{font-size:14px;font-weight:500;flex:1;}
.phrase-cn{font-size:12px;color:var(--text2);min-width:90px;}
.phrase-star{font-size:18px;cursor:pointer;color:var(--text3);flex-shrink:0;}
.phrase-star.on{color:#f5a623;}

/* ── 收藏页 ── */
.collect-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.collect-item:last-child{border-bottom:none;}
.collect-en{font-size:14px;font-weight:500;flex:1;}
.collect-cn{font-size:12px;color:var(--text2);margin-top:2px;}
.collect-from{font-size:11px;color:var(--text3);margin-top:2px;}
.collect-del{font-size:20px;color:var(--text3);cursor:pointer;flex-shrink:0;}
.collect-del:hover{color:#e24b4a;}
.add-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.add-row input{flex:1;min-width:100px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:inherit;outline:none;background:var(--white);}
.add-row input:focus{border-color:var(--blue);}

/* ── 记录页 ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-box{background:var(--white);border-radius:var(--r);padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-n{font-size:26px;font-weight:700;color:var(--blue);}
.stat-l{font-size:12px;color:var(--text2);margin-top:2px;}
.record-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.record-item:last-child{border-bottom:none;}
.record-icon{font-size:20px;}
.record-info{flex:1;}
.record-name{font-size:14px;font-weight:500;}
.record-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.record-score{font-size:20px;font-weight:700;color:var(--blue);}
.streak-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.streak-day{width:28px;height:28px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);}
.streak-day.done{background:var(--blue);color:#fff;}

@media(min-width:600px){
  .page-body,.chat-msgs,.result-body{max-width:680px;margin-left:auto;margin-right:auto;width:100%;}
  .scene-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- ── 口语练习页 ── -->
<div id="page-speak" class="page active">
  <div class="page-header">
    <div class="page-title">🎯 口语练习</div>
    <div class="page-sub">选等级和场景，开口说英文！</div>
  </div>
  <div class="page-body">
    <div class="level-tabs" id="level-tabs"></div>
    <div class="level-desc" id="level-desc"></div>
    <div class="speak-scene-list" id="speak-scene-list"></div>
  </div>
</div>

<!-- ── 场景练习页 ── -->
<div id="page-scene" class="page">
  <div class="page-header">
    <div class="page-title">🎭 场景练习</div>
    <div class="page-sub">按剧本练习，熟悉标准表达</div>
  </div>
  <div class="page-body">
    <div class="scene-grid" id="scene-grid"></div>
  </div>
</div>

<!-- ── 词句库页 ── -->
<div id="page-phrases" class="page">
  <div class="page-header">
    <div class="page-title">📚 词句库</div>
    <div class="page-sub">900串儿日常英语短语</div>
  </div>
  <div class="page-body">
    <div class="topic-scroll" id="topic-scroll"></div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:15px;font-weight:600;" id="topic-title"></div>
        <div style="font-size:12px;color:var(--text3);" id="topic-count"></div>
      </div>
      <div id="phrase-list"></div>
    </div>
  </div>
</div>

<!-- ── 我的收藏页 ── -->
<div id="page-collect" class="page">
  <div class="page-header">
    <div class="page-title">⭐ 我的收藏</div>
    <div class="page-sub">收藏的词句，随时复习</div>
  </div>
  <div class="page-body">
    <div class="card">
      <div class="add-row">
        <input id="add-en" placeholder="英文表达..."/>
        <input id="add-cn" placeholder="中文备注（可选）"/>
        <button class="btn btn-blue btn-sm" onclick="addCollectManual()">添加</button>
      </div>
      <div id="collect-list"></div>
    </div>
  </div>
</div>

<!-- ── 学习记录页 ── -->
<div id="page-records" class="page">
  <div class="page-header">
    <div class="page-title">📊 学习记录</div>
    <div class="page-sub">坚持练习，进步看得见</div>
  </div>
  <div class="page-body">
    <div class="stats-row" id="stats-row"></div>
    <div class="card" style="margin-bottom:10px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px;">最近7天打卡</div>
      <div class="streak-bar" id="streak-bar"></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:600;">练习明细</div>
        <button class="btn btn-sm btn-outline" onclick="clearRecords()" style="color:#e24b4a;border-color:#e24b4a;">清空</button>
      </div>
      <div id="records-list"></div>
    </div>
  </div>
</div>

<!-- ── 底部导航 ── -->
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('speak')"><div class="tab-icon">🎯</div><div class="tab-label">口语练习</div></div>
  <div class="tab-item" onclick="switchTab('scene')"><div class="tab-icon">🎭</div><div class="tab-label">场景练习</div></div>
  <div class="tab-item" onclick="switchTab('phrases')"><div class="tab-icon">📚</div><div class="tab-label">词句库</div></div>
  <div class="tab-item" onclick="switchTab('collect')"><div class="tab-icon">⭐</div><div class="tab-label">我的收藏</div></div>
  <div class="tab-item" onclick="switchTab('records')"><div class="tab-icon">📊</div><div class="tab-label">记录</div></div>
</div>

<!-- ── 对话全屏 ── -->
<div id="chat-screen">
  <div class="chat-nav">
    <div class="chat-back" onclick="exitChat()">←</div>
    <div class="chat-nav-title" id="chat-nav-title"></div>
    <div class="chat-level-badge" id="chat-level-badge"></div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-bottom">
    <div class="chat-status" id="chat-status">准备中...</div>
    <button class="mic-big disabled" id="mic-big" onclick="handleMicTap()">🎤</button>
    <div class="chat-hint" id="chat-hint">请稍候</div>
    <button class="chat-end-btn" onclick="finishChat()">结束对话，查看评分</button>
  </div>
</div>

<!-- ── 结果全屏 ── -->
<div id="result-screen">
  <div class="result-top">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-title" id="res-title">对话完成！</div>
    <div class="result-scene" id="res-scene"></div>
  </div>
  <div class="result-body">
    <div class="card">
      <div class="score-row">
        <div class="score-num" id="res-score">--</div>
        <div class="score-right">
          <div class="score-lbl">综合评分（满分100）</div>
          <div class="score-badge" id="res-badge"></div>
        </div>
      </div>
      <div class="bars" id="res-bars"></div>
    </div>
    <div class="gold-phrases" id="res-gold" style="display:none;">
      <div class="gold-title">🌟 今日金句 — 带走这几句话！</div>
      <div id="gold-list"></div>
    </div>
    <div class="feedback-box" id="res-feedback">分析中...</div>
    <div class="encourage-box" id="res-encourage"></div>
    <div class="result-btns">
      <button class="btn btn-blue" onclick="tryAgain()">再练一遍</button>
      <button class="btn btn-outline" onclick="closeResult()">返回</button>
    </div>
  </div>
</div>

// ══ 场景数据 ══════════════════════════════════════════════

// ══ 开始对话 ══════════════════════════════════════════════
async function startChat(sceneId){
  curScene = SCENES.find(s=>s.id===sceneId);
  chatHistory = []; userLines = [];
  document.getElementById('chat-nav-title').textContent = curScene.icon+' '+curScene.name;
  document.getElementById('chat-level-badge').textContent = curLevel.badge;
  document.getElementById('chat-msgs').innerHTML = '';
  document.getElementById('chat-screen').classList.add('open');
  setMic('disabled','准备中...','请稍候');
  addBubble('sys','对话开始！听AI说完后，点🎤说英文回应 😊');
  await aiTurn(null, true);
}

async function aiTurn(userText, isOpening){
  aiWaiting = true;
  if(userText) chatHistory.push({role:'user', content:userText});
  const systemPrompt = curScene.basePrompt + '\n\n' + curLevel.instruction
    + (isOpening ? `\n\nStart the conversation now as the ${curScene.aiRole}. Give ONE short warm greeting sentence only.` : '');
  setMic('disabled','AI说话中...','请听，说完再轮到你 🎧');
  try{
    const msgs = isOpening ? [] : chatHistory;
    const reply = await callArk(systemPrompt, msgs);
    chatHistory.push({role:'assistant', content:reply});
    addBubble('ai', curScene.aiRole+': '+reply);
    await speakText(reply);
  }catch(e){
    addBubble('err','⚠️ 网络连接失败，请检查网络后重试');
  }
  aiWaiting = false;
  if(userLines.length >= 10){
    setMic('disabled','对话完成！','');
    addBubble('sys','🎉 太棒了！完成了10轮对话，正在生成评分...');
    setTimeout(()=>finishChat(), 1200);
    return;
  }
  setMic('ready','轮到你说了！','点🎤 开始说英文 👇');
}

// ══ 麦克风 ════════════════════════════════════════════════
function handleMicTap(){
  const btn = document.getElementById('mic-big');
  if(btn.classList.contains('disabled')) return;
  if(isListening){ stopListen(); return; }
  startListen();
}

function startListen(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('请使用Chrome浏览器以支持语音功能。'); return; }
  window.speechSynthesis?.cancel();
  recognition = new SR();
  recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=true;
  let finalText='';
  recognition.onstart=()=>{ isListening=true; setMic('listening','正在听你说...','说完后会自动停止 🎙️'); };
  recognition.onresult=(e)=>{
    finalText=''; let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('chat-status').textContent = finalText||interim||'正在听...';
  };
  recognition.onend=()=>{
    isListening=false;
    if(finalText.trim()){
      userLines.push(finalText.trim());
      addBubble('user', finalText.trim());
      setMic('disabled','AI正在回应...','');
      aiTurn(finalText.trim(), false);
    } else {
      setMic('ready','没听到，再试一次','点🎤 重新说 👇');
    }
  };
  recognition.onerror=(e)=>{
    isListening=false;
    if(e.error==='not-allowed') alert('请允许浏览器使用麦克风。');
    setMic('ready','出错了，请再试','点🎤 重新说 👇');
  };
  recognition.start();
}

function stopListen(){ if(recognition) recognition.stop(); }

function setMic(state, status, hint){
  const btn = document.getElementById('mic-big');
  btn.className='mic-big';
  if(state==='disabled') btn.classList.add('disabled');
  else if(state==='listening') btn.classList.add('listening');
  else if(state==='speaking') btn.classList.add('speaking');
  btn.textContent = state==='listening'?'⏹':'🎤';
  document.getElementById('chat-status').textContent = status;
  document.getElementById('chat-hint').textContent = hint;
}

// ══ TTS朗读 ═══════════════════════════════════════════════
function speakText(text){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){ resolve(); return; }
    window.speechSynthesis.cancel();
    const sentences = text.match(/[^.!?]+[.!?]*/g)||[text];
    let idx=0;
    function next(){
      if(idx>=sentences.length){ resolve(); return; }
      const s=sentences[idx++].trim();
      if(!s){ next(); return; }
      const u=new SpeechSynthesisUtterance(s);
      u.lang='en-US'; u.rate=curLevel.ttsRate; u.pitch=1;
      const voices=window.speechSynthesis.getVoices();
      const v=voices.find(v=>v.lang.startsWith('en-US'))||voices.find(v=>v.lang.startsWith('en'));
      if(v) u.voice=v;
      u.onend=()=>setTimeout(next,120);
      u.onerror=()=>setTimeout(next,120);
      window.speechSynthesis.speak(u);
    }
    const vs=window.speechSynthesis.getVoices();
    if(vs.length>0) next();
    else{ window.speechSynthesis.onvoiceschanged=next; setTimeout(next,600); }
  });
}

// ══ 退出/结束对话 ══════════════════════════════════════════
function exitChat(){
  window.speechSynthesis?.cancel();
  if(recognition) recognition.stop();
  document.getElementById('chat-screen').classList.remove('open');
}

async function finishChat(){
  window.speechSynthesis?.cancel();
  if(recognition) recognition.stop();
  document.getElementById('chat-screen').classList.remove('open');
  document.getElementById('result-screen').classList.add('open');
  document.getElementById('res-score').textContent='--';
  document.getElementById('res-badge').textContent='';
  document.getElementById('res-bars').innerHTML='';
  document.getElementById('res-feedback').textContent='AI正在分析你的表现...';
  document.getElementById('res-encourage').textContent='';
  document.getElementById('res-gold').style.display='none';
  document.getElementById('res-scene').textContent=curScene.icon+' '+curScene.name+' · '+curLevel.badge;

  if(userLines.length===0){
    document.getElementById('res-emoji').textContent='😊';
    document.getElementById('res-title').textContent='下次加油！';
    document.getElementById('res-feedback').textContent='这次没有检测到你的发言，没关系！回去再练一次，开口就是进步！';
    document.getElementById('res-encourage').textContent='✨ 勇于开口是最重要的第一步！';
    return;
  }

  const transcript = userLines.map((l,i)=>`Turn ${i+1}: "${l}"`).join('\n');
  const evalPrompt=`You are an English speaking coach evaluating a Chinese learner (${curLevel.badge} level) in a "${curScene.name}" conversation as the user role.

Their ${userLines.length} responses:
${transcript}

Return ONLY valid JSON (no markdown):
{
  "overall": 82,
  "fluency": 80,
  "vocabulary": 78,
  "naturalness": 82,
  "confidence": 85,
  "emoji": "🌟",
  "title": "点餐小达人",
  "badge": "继续加油！",
  "feedback": "3-4 sentences warm specific feedback IN CHINESE highlighting what they did well and one area to improve",
  "encouragement": "1 motivating sentence IN CHINESE, fun and encouraging",
  "gold_phrases": [
    {"en": "I'll have the turkey, please.", "cn": "我要火鸡，谢谢"},
    {"en": "Can I get extra pickles?", "cn": "能多加点腌黄瓜吗？"}
  ]
}

Badge options: "非常出色！" "表现很棒！" "进步明显！" "继续加油！" "初战告捷！"
Title: a fun Chinese title like "点餐小达人" "酒店达人" "表达高手" "勇敢开口奖" etc.
gold_phrases: 2 useful English expressions from this conversation context that the learner should remember.`;

  try{
    const raw=await callArk(evalPrompt,[{role:'user',content:'Evaluate please.'}]);
    const res=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('res-emoji').textContent=res.emoji||'🎉';
    document.getElementById('res-title').textContent=res.title||'对话完成！';
    document.getElementById('res-score').textContent=res.overall;
    document.getElementById('res-badge').textContent=res.badge;
    document.getElementById('res-bars').innerHTML=[
      {label:'流利度',val:res.fluency},{label:'词汇量',val:res.vocabulary},
      {label:'自然度',val:res.naturalness},{label:'自信心',val:res.confidence},
    ].map(d=>`<div class="bar-row">
      <div class="bar-name">${d.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${d.val}%"></div></div>
      <div class="bar-val">${d.val}</div>
    </div>`).join('');
    document.getElementById('res-feedback').textContent=res.feedback||'';
    document.getElementById('res-encourage').textContent='✨ '+(res.encouragement||'坚持练习，你会越来越棒的！');
    // 今日金句
    if(res.gold_phrases?.length){
      document.getElementById('res-gold').style.display='block';
      document.getElementById('gold-list').innerHTML=res.gold_phrases.map(p=>`
        <div class="gold-item">
          <div style="flex:1;">
            <div class="gold-en">${p.en}</div>
            <div class="gold-cn">${p.cn}</div>
          </div>
          <span class="gold-save" onclick="saveGoldPhrase('${p.en.replace(/'/g,"\\'")}','${p.cn.replace(/'/g,"\\'")}',this)">☆</span>
        </div>`).join('');
    }
    // 保存记录
    records.unshift({scene:curScene.name,emoji:curScene.icon,level:curLevel.badge,score:res.overall,title:res.title,date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()});
    if(records.length>100) records=records.slice(0,100);
    localStorage.setItem('eq_records',JSON.stringify(records));
  }catch(e){
    document.getElementById('res-emoji').textContent='🎉';
    document.getElementById('res-title').textContent='对话完成！';
    document.getElementById('res-score').textContent='85';
    document.getElementById('res-badge').textContent='继续加油！';
    document.getElementById('res-bars').innerHTML=['流利度','词汇量','自然度','自信心'].map(l=>`
      <div class="bar-row"><div class="bar-name">${l}</div>
      <div class="bar-track"><div class="bar-fill" style="width:85%"></div></div>
      <div class="bar-val">85</div></div>`).join('');
    document.getElementById('res-feedback').textContent='你完成了这段对话，非常棒！开口说英文就是最大的进步。';
    document.getElementById('res-encourage').textContent='✨ 每天坚持练习，你的英语会越来越自然！';
    records.unshift({scene:curScene.name,emoji:curScene.icon,level:curLevel.badge,score:85,title:'对话完成',date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()});
    localStorage.setItem('eq_records',JSON.stringify(records));
  }
}

function saveGoldPhrase(en,cn,el){
  if(collected.find(c=>c.en===en)) return;
  collected.unshift({en,cn,from:'今日金句',ts:Date.now()});
  localStorage.setItem('eq_collected',JSON.stringify(collected));
  el.textContent='★'; el.style.color='#f5a623';
}

let scriptState = {scene:null, userRole:null, aiRole:null, idx:0, userLines:[], open:false};

function renderScenePage(){
  document.getElementById('scene-grid').innerHTML = SCRIPT_SCENES.map(s=>`
    <div class="scene-card" onclick="openScriptScene('${s.id}')">
      <div class="scene-emoji">${s.emoji}</div>
      <div class="scene-name">${s.name}</div>
      <span class="tag ${s.catClass}">${s.cat}</span>
      <div class="scene-desc" style="margin-top:4px;">${s.desc}</div>
    </div>`).join('');
}

function openScriptScene(id){
  const s = SCRIPT_SCENES.find(x=>x.id===id);
  // 显示角色选择
  const choice = confirm(`场景：${s.emoji} ${s.name}\n\n你要扮演哪个角色？\n\n确定 = ${s.roles[0].cn}（${s.roles[0].en}）\n取消 = ${s.roles[1].cn}（${s.roles[1].en}）`);
  const userR = choice ? s.roles[0] : s.roles[1];
  const aiR = choice ? s.roles[1] : s.roles[0];
  scriptState = {scene:s, userRole:userR, aiRole:aiR, idx:0, userLines:[], open:true};
  // 复用chat screen
  chatHistory=[]; userLines=[];
  document.getElementById('chat-nav-title').textContent = s.emoji+' '+s.name;
  document.getElementById('chat-level-badge').textContent = '剧本模式';
  document.getElementById('chat-msgs').innerHTML='';
  document.getElementById('chat-screen').classList.add('open');
  setMic('disabled','剧本对话','');
  addBubble('sys',`对话开始！你扮演${userR.cn}，点🎤说英文，或听AI示范后跳过。`);
  runScript();
}

async function runScript(){
  const {scene, userRole, aiRole, idx} = scriptState;
  if(idx >= scene.script.length){
    addBubble('sys','🎉 剧本完成！你可以多练几遍。');
    setMic('disabled','对话完成','');
    return;
  }
  const line = scene.script[idx];
  if(line.r === aiRole.en){
    addBubble('ai', aiRole.en+': '+line.t);
    await speakText(line.t);
    scriptState.idx++;
    runScript();
  } else {
    // 用户回合
    setMic('ready','轮到你说了！','点🎤 说：'+line.t.substring(0,20)+'...');
  }
}

// 覆盖 sendChat 用于剧本模式
const _origMicEnd = null;
function handleMicTap(){
  const btn = document.getElementById('mic-big');
  if(btn.classList.contains('disabled')) return;
  if(isListening){ stopListen(); return; }
  // 判断是剧本还是AI对话
  if(scriptState.open && document.getElementById('chat-level-badge').textContent==='剧本模式'){
    startListenScript();
  } else {
    startListen();
  }
}

function startListenScript(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('请使用Chrome浏览器。');return;}
  window.speechSynthesis?.cancel();
  recognition=new SR();
  recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=true;
  let finalText='';
  recognition.onstart=()=>{isListening=true;setMic('listening','正在听...','说完自动停止');};
  recognition.onresult=(e)=>{
    finalText=''; let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalText+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('chat-status').textContent=finalText||interim||'正在听...';
  };
  recognition.onend=()=>{
    isListening=false;
    if(finalText.trim()){
      addBubble('user',finalText.trim());
    }
    scriptState.idx++;
    setMic('disabled','','');
    runScript();
  };
  recognition.onerror=()=>{isListening=false;setMic('ready','出错了，再试','点🎤');};
  recognition.start();
}

function renderPhrases(){
  const scroll=document.getElementById('topic-scroll');
  scroll.innerHTML=PHRASE_TOPICS.map((t,i)=>`
    <button class="topic-btn${i===curPhraseIdx?' active':''}" onclick="selectTopic(${i})">${t.name}</button>`).join('');
  showTopic(curPhraseIdx);
}

function selectTopic(i){
  curPhraseIdx=i;
  document.querySelectorAll('.topic-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  showTopic(i);
}

function showTopic(i){
  const t=PHRASE_TOPICS[i];
  document.getElementById('topic-title').textContent=t.name;
  document.getElementById('topic-count').textContent=t.phrases.length+'个短语';
  const savedEns=collected.map(c=>c.en);
  document.getElementById('phrase-list').innerHTML=t.phrases.map(p=>{
    const on=savedEns.includes(p.en);
    return `<div class="phrase-item">
      <div style="flex:1;"><div class="phrase-en">${p.en}</div><div class="phrase-cn">${p.cn}</div></div>
      <span class="phrase-star${on?' on':''}" onclick="togglePhraseStar(this,'${p.en.replace(/'/g,"\\'")}','${p.cn.replace(/'/g,"\\'")}')">
        ${on?'★':'☆'}</span></div>`;}).join('');
}

function togglePhraseStar(el,en,cn){
  const idx=collected.findIndex(c=>c.en===en);
  if(idx>=0){collected.splice(idx,1);el.textContent='☆';el.classList.remove('on');}
  else{collected.unshift({en,cn,from:'词句库',ts:Date.now()});el.textContent='★';el.classList.add('on');}
  localStorage.setItem('eq_collected',JSON.stringify(collected));
}

function addCollectManual(){
  const en=document.getElementById('add-en').value.trim();
  const cn=document.getElementById('add-cn').value.trim();
  if(!en) return;
  collected.unshift({en,cn,from:'手动添加',ts:Date.now()});
  localStorage.setItem('eq_collected',JSON.stringify(collected));
  document.getElementById('add-en').value='';
  document.getElementById('add-cn').value='';
  renderCollect();
}

function delCollect(i){
  collected.splice(i,1);
  localStorage.setItem('eq_collected',JSON.stringify(collected));
  renderCollect();
}

// ══ 学习记录 ══════════════════════════════════════════════
function renderRecords(){
  const total=records.length;
  const avg=total?Math.round(records.reduce((s,r)=>s+r.score,0)/total):0;
  const best=total?Math.max(...records.map(r=>r.score)):0;
  document.getElementById('stats-row').innerHTML=[
    {n:total,l:'累计练习次数'},{n:avg,l:'平均评分'},{n:best,l:'最高评分'}
  ].map(s=>`<div class="stat-box"><div class="stat-n">${s.n}</div><div class="stat-l">${s.l}</div></div>`).join('');
  // 打卡
  const today=new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ds=d.toLocaleDateString('zh-CN');
    const done=records.some(r=>r.date===ds);
    days.push({label:['日','一','二','三','四','五','六'][d.getDay()],done});
  }
  document.getElementById('streak-bar').innerHTML=days.map(d=>`
    <div class="streak-day${d.done?' done':''}">${d.label}</div>`).join('');
  if(!total){
    document.getElementById('records-list').innerHTML='<div class="empty">还没有练习记录，快去练习吧！🚀</div>';
    return;
  }
  document.getElementById('records-list').innerHTML=records.map(r=>`
    <div class="record-item">
      <div class="record-icon">${r.emoji||'🗣️'}</div>
      <div class="record-info">
        <div class="record-name">${r.scene} <span style="font-size:11px;color:var(--text3);">· ${r.level||''}</span></div>
        <div class="record-meta">${r.title||''} · ${r.date}</div>
      </div>
      <div class="record-score">${r.score}</div>
    </div>`).join('');
}

function clearRecords(){
  if(confirm('确定清空所有记录？')){
    records=[];localStorage.removeItem('eq_records');renderRecords();
  }
}

// ══ API调用 ═══════════════════════════════════════════════
async function callArk(system, messages){
  const resp=await fetch(ARK_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+ARK_API_KEY},
    body:JSON.stringify({model:ARK_ENDPOINT,max_tokens:300,
      messages:[{role:'system',content:system},...messages]})
  });
  const data=await resp.json();
  if(data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

function addBubble(type,text){
  const area=document.getElementById('chat-msgs');
  const div=document.createElement('div');
  div.className='bubble '+type; div.textContent=text;
  area.appendChild(div); area.scrollTop=area.scrollHeight; return div;
}
