<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语口语陪练</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e0ddd8;--border2:#ccc;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --coral:#993C1D;--coral-light:#FAECE7;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --green:#3B6D11;--green-light:#EAF3DE;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
nav{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:960px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;height:52px;}
.nav-logo{font-size:16px;font-weight:600;color:var(--blue);margin-right:auto;white-space:nowrap;}
.nav-tabs{display:flex;}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}
.page{display:none;max-width:960px;margin:0 auto;padding:1.5rem 1rem;}
.page.active{display:block;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.card+.card{margin-top:1rem;}
.sec-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;}
.sec-sub{font-size:14px;color:var(--text2);margin-bottom:1.25rem;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;font-weight:500;}
.tag-blue{background:var(--blue-light);color:var(--blue);}
.tag-teal{background:var(--teal-light);color:var(--teal);}
.tag-amber{background:var(--amber-light);color:var(--amber);}
.tag-coral{background:var(--coral-light);color:var(--coral);}
.tag-purple{background:var(--purple-light);color:var(--purple);}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:var(--blue-dark);}
.btn-sm{padding:5px 12px;font-size:13px;}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.scene-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.scene-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(24,95,165,.1);}
.scene-emoji{font-size:28px;margin-bottom:8px;}
.scene-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.scene-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:4px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem;}
.role-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;text-align:center;transition:all .15s;}
.role-card:hover{border-color:var(--blue);background:var(--blue-light);}
.role-cn{font-size:16px;font-weight:600;}
.role-en{font-size:13px;color:var(--text2);margin-top:2px;}
.role-hint{font-size:12px;color:var(--text3);margin-top:6px;}
.context-bar{background:var(--blue-light);border-left:3px solid var(--blue);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--blue-dark);line-height:1.6;margin-bottom:12px;}
.chat-messages{display:flex;flex-direction:column;gap:10px;min-height:300px;max-height:450px;overflow-y:auto;padding:4px 2px;margin-bottom:12px;}
.bubble{max-width:80%;padding:10px 14px;font-size:14px;line-height:1.6;border-radius:16px;word-break:break-word;}
.bubble.ai{background:var(--bg2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.bubble.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.bubble.hint{background:var(--amber-light);color:var(--amber);align-self:flex-start;font-style:italic;font-size:13px;}
.bubble.system{background:var(--teal-light);color:var(--teal);align-self:center;font-size:13px;text-align:center;max-width:95%;border-radius:var(--radius-sm);}
.bubble.typing{background:var(--bg2);color:var(--text3);align-self:flex-start;border-bottom-left-radius:4px;font-style:italic;}
.chat-tools{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.chat-input-row{display:flex;gap:8px;align-items:center;}
.chat-input-row textarea{flex:1;resize:none;font-size:14px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:inherit;line-height:1.5;min-height:44px;max-height:100px;color:var(--text);background:var(--bg);outline:none;}
.chat-input-row textarea:focus{border-color:var(--blue);}
.chat-tip{font-size:12px;color:var(--text3);margin-top:6px;}
.mic-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.mic-btn:hover{background:var(--bg2);}
.mic-btn.listening{background:#e24b4a;border-color:#e24b4a;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.score-big{font-size:56px;font-weight:700;color:var(--blue);line-height:1;}
.score-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.bars-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:5px;}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .7s ease;}
.feedback-box{background:var(--bg2);border-radius:var(--radius);padding:1.25rem;margin-top:1rem;font-size:14px;line-height:1.8;white-space:pre-wrap;}
.encourage-box{background:var(--teal-light);border-radius:var(--radius);padding:1rem 1.25rem;margin-top:1rem;font-size:14px;color:var(--teal);line-height:1.7;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:1rem;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--blue);}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;}
.record-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.record-item:last-child{border-bottom:none;}
.record-score{font-size:20px;font-weight:700;color:var(--blue);min-width:36px;text-align:right;}
.vocab-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.vocab-tab{padding:8px 16px;font-size:14px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;}
.vocab-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}
.phrase-topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:1rem;}
.phrase-topic-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;font-size:13px;transition:all .15s;text-align:center;}
.phrase-topic-btn:hover,.phrase-topic-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}
.phrase-topic-name{font-size:12px;margin-top:4px;color:var(--text2);}
.phrase-topic-btn.active .phrase-topic-name{color:var(--blue);}
.phrase-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.phrase-item:last-child{border-bottom:none;}
.phrase-en{font-size:14px;font-weight:500;flex:1;}
.phrase-cn{font-size:13px;color:var(--text2);min-width:100px;}
.phrase-save{font-size:20px;cursor:pointer;color:var(--text3);padding:0 4px;transition:color .15s;}
.phrase-save:hover{color:var(--blue);}
.phrase-save.saved{color:var(--blue);}
.vocab-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.vocab-item:last-child{border-bottom:none;}
.vocab-en{font-size:14px;font-weight:500;flex:1;}
.vocab-cn{font-size:13px;color:var(--text2);margin-top:2px;}
.vocab-scene{font-size:11px;color:var(--text3);margin-top:2px;}
.vocab-del{color:var(--text3);cursor:pointer;font-size:20px;padding:0 4px;}
.vocab-del:hover{color:#e24b4a;}
.vocab-add-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.vocab-add-row input{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;}
.vocab-add-row input:focus{border-color:var(--blue);}
.free-topic-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;transition:all .15s;}
.free-topic-btn:hover,.free-topic-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.free-level{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;transition:all .15s;}
.free-level.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1.25rem;background:none;border:none;font-family:inherit;padding:0;}
.back-btn:hover{color:var(--text);}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-mask.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;max-width:400px;width:90%;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1rem;}
.modal input{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;margin-bottom:8px;outline:none;}
.modal input:focus{border-color:var(--blue);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.chat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.loading-dot::after{content:'';animation:ldots 1.2s steps(4,end) infinite;}
@keyframes ldots{0%,20%{content:'.'} 40%{content:'..'} 60%,80%{content:'...'} 100%{content:''}}
@media(max-width:600px){
  .nav-inner{flex-direction:column;height:auto;padding:0;}
  .nav-logo{width:100%;padding:10px 1rem 4px;font-size:15px;}
  .nav-tabs{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .nav-tab{padding:0 12px;height:40px;font-size:13px;flex-shrink:0;}
  .scene-grid{grid-template-columns:repeat(2,1fr);}
  .bars-grid{grid-template-columns:1fr;}
  .role-grid{grid-template-columns:1fr;}
  .phrase-cn{min-width:80px;}
  .page{padding:1rem 0.75rem;}
  .chat-messages{max-height:380px;}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-logo">🗣️ 英语口语陪练</div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('scenes')">场景练习</div>
      <div class="nav-tab" onclick="switchTab('free')">自由对话</div>
      <div class="nav-tab" onclick="switchTab('records')">学习记录</div>
      <div class="nav-tab" onclick="switchTab('vocab')">词句库</div>
    </div>
  </div>
</nav>

<div id="page-scenes" class="page active">
  <div class="sec-title">选择场景开始练习</div>
  <div class="sec-sub">全程英文沉浸式对话，AI真实扮演对方角色，练完获得专属评分和建议。</div>
  <div class="scene-grid" id="scene-grid"></div>
</div>

<div id="page-role" class="page">
  <button class="back-btn" onclick="showPage('scenes')">← 返回</button>
  <div id="role-title" class="sec-title"></div>
  <div id="role-desc" class="sec-sub"></div>
  <div style="font-size:14px;color:var(--text2);margin-bottom:8px;">选择你要扮演的角色：</div>
  <div class="role-grid" id="role-grid"></div>
</div>

<div id="page-chat" class="page">
  <button class="back-btn" onclick="exitChat()">← 退出场景</button>
  <div class="chat-header">
    <span id="chat-scene-tag" class="tag"></span>
    <span id="chat-role-tag" class="tag tag-teal"></span>
    <button class="btn btn-sm" id="tts-btn" onclick="toggleTTS()" style="margin-left:auto;">🔊 朗读开</button>
  </div>
  <div class="context-bar" id="chat-context"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-tools">
    <button class="btn btn-sm" onclick="openVocabModal()">📝 加入词句库</button>
  </div>
  <div class="chat-input-row">
    <button class="mic-btn" id="chat-mic" onclick="toggleMic('chat')">🎤</button>
    <textarea id="chat-input" placeholder="点🎤说英文，或直接打字..." rows="1" onkeydown="handleChatKey(event)"></textarea>
    <button class="btn btn-primary" onclick="sendChat()">发送</button>
  </div>
  <div class="chat-tip" id="chat-tip">点🎤开始说话 · 或打字后按 Enter 发送</div>
</div>

<div id="page-result" class="page">
  <button class="back-btn" onclick="showPage('scenes')">← 返回场景列表</button>
  <div class="sec-title">🎉 对话完成！</div>
  <div class="card" style="margin-top:1rem;">
    <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;">
      <div>
        <div class="score-big" id="res-score">--</div>
        <div class="score-sub">综合评分（满分100）</div>
      </div>
      <span id="res-badge" class="tag" style="font-size:13px;padding:4px 12px;"></span>
    </div>
    <div class="bars-grid" id="res-bars"></div>
  </div>
  <div class="feedback-box" id="res-feedback"><span class="loading-dot">AI正在分析你的表现</span></div>
  <div class="encourage-box" id="res-encourage"></div>
  <div style="display:flex;gap:10px;margin-top:1.25rem;flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="tryAgain()">再练一遍</button>
    <button class="btn" onclick="showPage('scenes')">换个场景</button>
    <button class="btn" onclick="switchTab('records')">查看记录</button>
  </div>
</div>

<div id="page-free" class="page">
  <div id="free-setup">
    <div class="sec-title">自由对话模式</div>
    <div class="sec-sub">不按剧本，AI真实扮演对方，随机应变。更接近真实口语场景。</div>
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:10px;">选择话题：</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;" id="free-topics"></div>
      <div style="font-size:14px;font-weight:500;margin-bottom:8px;">你的英语水平：</div>
      <div style="display:flex;gap:8px;margin-bottom:1.25rem;">
        <button class="free-level active" data-level="beginner" onclick="setLevel(this)">初级</button>
        <button class="free-level" data-level="intermediate" onclick="setLevel(this)">中级</button>
        <button class="free-level" data-level="advanced" onclick="setLevel(this)">高级</button>
      </div>
      <button class="btn btn-primary" onclick="startFreeChat()">开始自由对话</button>
    </div>
  </div>
  <div id="free-chat" style="display:none;">
    <button class="back-btn" onclick="endFreeChat()">← 结束对话</button>
    <div class="chat-header">
      <span id="free-topic-tag" class="tag tag-purple"></span>
      <span class="tag tag-amber" id="free-level-tag"></span>
      <button class="btn btn-sm" id="free-tts-btn" onclick="toggleTTS()" style="margin-left:auto;">🔊 朗读开</button>
    </div>
    <div class="context-bar" id="free-context"></div>
    <div class="chat-messages" id="free-messages" style="max-height:440px;"></div>
    <div class="chat-tools">
      <button class="btn btn-sm" onclick="openVocabModal()">📝 加入词句库</button>
    </div>
    <div class="chat-input-row">
      <button class="mic-btn" id="free-mic" onclick="toggleMic('free')">🎤</button>
      <textarea id="free-input" placeholder="点🎤说英文，或直接打字..." rows="1" onkeydown="handleFreeKey(event)"></textarea>
      <button class="btn btn-primary" onclick="sendFree()">发送</button>
    </div>
    <div class="chat-tip" id="free-tip">点🎤开始说话 · 或打字后按 Enter 发送</div>
  </div>
</div>

<div id="page-records" class="page">
  <div class="sec-title">学习记录</div>
  <div class="sec-sub">坚持每天练习，进步看得见。</div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:10px;">评分趋势</div>
    <canvas id="score-chart" height="140"></canvas>
  </div>
  <div class="card" style="margin-top:1rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:14px;font-weight:500;">练习明细</div>
      <button class="btn btn-sm" onclick="clearRecords()" style="color:#e24b4a;border-color:#e24b4a;">清空记录</button>
    </div>
    <div id="records-list"></div>
  </div>
</div>

<div id="page-vocab" class="page">
  <div class="sec-title">词句库</div>
  <div class="sec-sub">浏览900串儿短语，或收藏练习中不会的表达。</div>
  <div class="vocab-tabs">
    <div class="vocab-tab active" onclick="switchVocabTab('phrases')">📚 900串儿短语</div>
    <div class="vocab-tab" onclick="switchVocabTab('saved')">⭐ 我的收藏</div>
  </div>
  <div id="vocab-phrases">
    <div class="phrase-topic-grid" id="phrase-topics"></div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div id="phrase-topic-title" style="font-size:15px;font-weight:600;"></div>
        <div style="font-size:12px;color:var(--text3);" id="phrase-count"></div>
      </div>
      <div id="phrase-list"></div>
    </div>
  </div>
  <div id="vocab-saved" style="display:none;">
    <div class="card">
      <div class="vocab-add-row">
        <input id="vocab-en-input" placeholder="英文表达..." />
        <input id="vocab-cn-input" placeholder="中文备注（可选）" />
        <button class="btn btn-primary btn-sm" onclick="addVocabManual()">添加</button>
      </div>
      <div id="vocab-list"></div>
    </div>
  </div>
</div>

<div class="modal-mask" id="vocab-modal">
  <div class="modal">
    <h3>📝 加入词句库收藏</h3>
    <input id="modal-en" placeholder="英文表达（必填）" />
    <input id="modal-cn" placeholder="中文备注（可选）" />
    <div class="modal-btns">
      <button class="btn btn-sm" onclick="closeVocabModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveVocabModal()">保存</button>
    </div>
  </div>
</div>

<script>
// ══ 配置 ══════════════════════════════════════════════════
const ARK_API_KEY = 'ark-5f63ade4-9f0c-4cf9-acd3-bfde292edac4-c69dd';
const ARK_ENDPOINT = 'ep-20260625221755-f7mdk';
const ARK_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';

// ══ 场景数据 ══════════════════════════════════════════════
const SCENES = [
  {id:'sandwich',name:'三明治点餐',emoji:'🥖',cat:'餐饮',catTag:'tag-amber',
   desc:'在快餐店定制三明治，选面包、配料和酱料。',
   roles:[{en:'Customer',cn:'顾客'},{en:'Staff',cn:'店员'}],

function renderScenes(){
  document.getElementById('scene-grid').innerHTML=SCENES.map(s=>`

      <div class="scene-emoji">${s.emoji}</div>

function selectScene(id){
  curScene=SCENES.find(s=>s.id===id);
  document.getElementById('role-title').textContent=curScene.emoji+' '+curScene.name;
  document.getElementById('role-desc').textContent=curScene.desc;

    <div class="role-card" onclick="startChat('${r.en}','${r.cn}')">
      <div class="role-cn">${r.cn}</div>
      <div class="role-en">${r.en}</div>
      <div class="role-hint">扮演${r.cn}角色</div>
    </div>`).join('');
  showPage('role');
}

// ══ AI对话（真实AI，非剧本）══════════════════════════════
async function startChat(roleEn, roleCn){
  userRoleEn=roleEn; userRoleCn=roleCn;
  chatHistory=[]; userLines=[];

  document.getElementById('chat-scene-tag').textContent=curScene.emoji+' '+curScene.name;
  document.getElementById('chat-scene-tag').className='tag '+curScene.catTag;
  document.getElementById('chat-role-tag').textContent='你：'+roleCn+' ('+roleEn+')';
  document.getElementById('chat-context').textContent='📍 场景：'+curScene.desc+' 你扮演：'+roleCn;
  document.getElementById('chat-messages').innerHTML='';
  document.getElementById('chat-input').value='';
  document.getElementById('chat-input').disabled=false;
  showPage('chat');

  addMsg('system','对话开始！全程请用英文。点🎤说话，AI会自动回应。加油！💪');

  // AI先开口
  const aiRoleName = curScene.aiRole;
  const openingPrompt = curScene.systemPrompt + `\n\nStart the conversation naturally as the ${aiRoleName}. Give a warm, brief opening line (1 sentence).`;
  const typingEl = addMsg('typing', aiRoleName+': ...');
  try{
    const reply = await callArk(openingPrompt, []);
    typingEl.className='bubble ai';
    typingEl.textContent=aiRoleName+': '+reply;
    speak(reply);
    chatHistory.push({role:'assistant', content:reply});
  }catch(e){
    typingEl.className='bubble ai';
    typingEl.textContent=aiRoleName+': Hello! How can I help you today?';
    speak('Hello! How can I help you today?');
    chatHistory.push({role:'assistant', content:'Hello! How can I help you today?'});
  }
}

function handleChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

async function sendChat(){
  if(aiWaiting) return;
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim(); if(!text) return;
  inp.value='';
  addMsg('user', text);
  userLines.push(text);
  chatHistory.push({role:'user', content:text});

  aiWaiting=true;
  const aiRoleName=curScene.aiRole;
  const typingEl=addMsg('typing', aiRoleName+': ...');
  try{
    const reply=await callArk(curScene.systemPrompt, chatHistory);
    typingEl.className='bubble ai';
    typingEl.textContent=aiRoleName+': '+reply;
    speak(reply);
    chatHistory.push({role:'assistant', content:reply});
    // 对话超过8轮自动结束
    if(userLines.length>=8){
      setTimeout(()=>{
        addMsg('system','🎉 对话完成！正在生成你的专属反馈...');
        document.getElementById('chat-input').disabled=true;
        setTimeout(()=>showResult(),800);
      },1500);
    }
  }catch(e){
    typingEl.className='bubble hint';
    typingEl.textContent='⚠️ 网络连接失败，请检查网络后重试。';
  }
  aiWaiting=false;
}

function exitChat(){
  window.speechSynthesis?.cancel();
  showPage('scenes');
}

// ══ 结果评分 ══════════════════════════════════════════════
async function showResult(){
  showPage('result');
  document.getElementById('res-score').textContent='--';
  document.getElementById('res-badge').textContent='';
  document.getElementById('res-bars').innerHTML='';
  document.getElementById('res-feedback').innerHTML='<span class="loading-dot">AI正在分析你的表现</span>';
  document.getElementById('res-encourage').textContent='';

  const transcript=userLines.map((l,i)=>`Turn ${i+1}: "${l}"`).join('\n');
  const evalPrompt=`You are an English speaking coach evaluating a Chinese learner's performance in a "${curScene.name}" conversation where they played the role of "${userRoleEn}".

Their responses:
${transcript}

Return ONLY valid JSON (no markdown, no explanation):
{"overall":85,"fluency":80,"vocabulary":85,"naturalness":80,"confidence":90,"feedback":"3-4 sentences of warm specific feedback IN CHINESE pointing out strengths and areas to improve","encouragement":"1 uplifting sentence IN CHINESE to keep them motivated","badge":"继续加油！","suggestions":["specific suggestion 1 in Chinese","specific suggestion 2 in Chinese"]}

Badge options: "非常出色！" "表现很棒！" "进步明显！" "继续加油！" "初战告捷！"`;

  try{
    const raw=await callArk(evalPrompt,[{role:'user',content:'Please evaluate my performance.'}]);
    const res=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('res-score').textContent=res.overall;
    const badge=document.getElementById('res-badge');
    badge.textContent=res.badge; badge.style.cssText='font-size:13px;padding:4px 12px;';
    badge.className='tag '+(res.overall>=85?'tag-teal':res.overall>=70?'tag-blue':'tag-amber');
    document.getElementById('res-bars').innerHTML=[
      {label:'流利度',val:res.fluency},{label:'词汇量',val:res.vocabulary},
      {label:'自然度',val:res.naturalness},{label:'自信心',val:res.confidence},
    ].map(d=>`<div><div class="bar-label"><span>${d.label}</span><span>${d.val}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${d.val}%"></div></div></div>`).join('');
    let fb=res.feedback||'';
    if(res.suggestions?.length) fb+='\n\n💬 建议：\n'+res.suggestions.map(s=>'• '+s).join('\n');
    document.getElementById('res-feedback').textContent=fb;
    document.getElementById('res-encourage').textContent='✨ '+(res.encouragement||'坚持练习，你会越来越棒的！');
    records.unshift({scene:curScene.name,emoji:curScene.emoji,score:res.overall,date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()});
    if(records.length>100) records=records.slice(0,100);
    localStorage.setItem('eq_records',JSON.stringify(records));
  }catch(e){
    document.getElementById('res-score').textContent='85';
    const badge=document.getElementById('res-badge');
    badge.textContent='继续加油！'; badge.className='tag tag-blue'; badge.style.cssText='font-size:13px;padding:4px 12px;';
    document.getElementById('res-bars').innerHTML=['流利度','词汇量','自然度','自信心'].map(l=>`
      <div><div class="bar-label"><span>${l}</span><span>85</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:85%"></div></div></div>`).join('');
    document.getElementById('res-feedback').textContent='完成了这段对话，非常棒！继续坚持每天练习，口语会越来越流利的。';
    document.getElementById('res-encourage').textContent='✨ 每一次开口都是进步，继续坚持下去！';
    records.unshift({scene:curScene.name,emoji:curScene.emoji,score:85,date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()});
    localStorage.setItem('eq_records',JSON.stringify(records));
  }
}

// ══ 自由对话 ══════════════════════════════════════════════
function renderFreeSetup(){
  document.getElementById('free-topics').innerHTML=FREE_TOPICS.map(t=>`
    <button class="free-topic-btn${freeTopic===t.id?' active':''}" onclick="setTopic('${t.id}',this)">${t.label}</button>`).join('');
}
function setTopic(id,el){freeTopic=id;document.querySelectorAll('.free-topic-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function setLevel(el){freeLevel=el.dataset.level;document.querySelectorAll('.free-level').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

async function startFreeChat(){
  freeChatHistory=[];
  document.getElementById('free-setup').style.display='none';
  document.getElementById('free-chat').style.display='block';
  const topic=FREE_TOPICS.find(t=>t.id===freeTopic);
  const levelLabel={beginner:'初级',intermediate:'中级',advanced:'高级'}[freeLevel];
  document.getElementById('free-topic-tag').textContent=topic.label;
  document.getElementById('free-level-tag').textContent=levelLabel;
  document.getElementById('free-context').textContent='📍 话题：'+topic.label+'　难度：'+levelLabel+'　全程英文，放松说话！';
  document.getElementById('free-messages').innerHTML='';
  document.getElementById('free-input').value='';
  addFreeMsg('system','自由对话开始！AI会根据你的水平自然对话。点🎤开口说！😊');

  const levelInstructions = {
    beginner: 'IMPORTANT: The learner is a BEGINNER. Use ONLY very simple words (A1-A2 level). Keep each sentence under 8 words. Speak slowly and clearly. Ask only ONE simple question at a time. Use simple present tense mostly.',
    intermediate: 'The learner is intermediate level. Use everyday vocabulary. Keep sentences moderate length. Ask one follow-up question.',
    advanced: 'The learner is advanced. Speak naturally with varied vocabulary and sentence structures.'
  };
  const sysPrompt=`You are a friendly English conversation partner helping a Chinese learner practice speaking. ${topic.prompt} ${levelInstructions[freeLevel]} If the learner makes a grammar mistake, naturally model the correct form in your reply. Speak only English. Start the conversation warmly with a very simple opening.`;

  const loadEl=addFreeMsg('typing','AI: ...');
  try{
    const r=await callArk(sysPrompt,[{role:'user',content:'[Start the conversation]'}]);
    loadEl.className='bubble ai'; loadEl.textContent='AI: '+r;
    speak(r, freeLevel); freeChatHistory.push({role:'assistant',content:r});
  }catch(e){
    loadEl.className='bubble ai'; loadEl.textContent="AI: Hi! Let's practice English together! What would you like to talk about?";
    speak("Hi! Let's practice English together!", freeLevel); 
    freeChatHistory.push({role:'assistant',content:"Hi! Let's practice!"});
  }
}

function endFreeChat(){
  window.speechSynthesis?.cancel();
  document.getElementById('free-setup').style.display='block';
  document.getElementById('free-chat').style.display='none';
  freeChatHistory=[];
}

function handleFreeKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFree();}}

async function sendFree(){
  const inp=document.getElementById('free-input');
  const text=inp.value.trim(); if(!text||aiWaiting) return;
  inp.value=''; addFreeMsg('user',text); freeChatHistory.push({role:'user',content:text});
  aiWaiting=true;
  const loadEl=addFreeMsg('typing','AI: ...');
  const topic=FREE_TOPICS.find(t=>t.id===freeTopic);
  const levelInstr = {
    beginner: 'IMPORTANT: Use ONLY simple words. Max 8 words per sentence. One simple question only.',
    intermediate: 'Use everyday vocabulary. Moderate sentence length. One follow-up question.',
    advanced: 'Speak naturally with varied vocabulary.'
  };
  const sysPrompt=`You are a friendly English conversation partner. ${topic.prompt} ${levelInstr[freeLevel]} Naturally correct errors by modeling correct usage. Speak only English.`;
  try{
    const r=await callArk(sysPrompt, freeChatHistory);
    loadEl.className='bubble ai'; loadEl.textContent='AI: '+r;
    speak(r, freeLevel); freeChatHistory.push({role:'assistant',content:r});
  }catch(e){
    loadEl.className='bubble hint'; loadEl.textContent='⚠️ 网络连接失败，请重试。';
  }
  aiWaiting=false;
}

// ══ TTS朗读 ═══════════════════════════════════════════════
function speak(text, level){
  if(!ttsEnabled||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const rate = level==='beginner'?0.72 : level==='intermediate'?0.82 : 0.92;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang.startsWith('en-US'))||voices.find(v=>v.lang.startsWith('en'));
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  sentences.forEach(s=>{
    const utter=new SpeechSynthesisUtterance(s.trim());
    utter.lang='en-US'; utter.rate=rate; utter.pitch=1;
    if(v) utter.voice=v;
    window.speechSynthesis.speak(utter);
  });
}

function toggleTTS(){
  ttsEnabled=!ttsEnabled;
  document.querySelectorAll('#tts-btn,#free-tts-btn').forEach(b=>{
    if(b) b.textContent=ttsEnabled?'🔊 朗读开':'🔇 朗读关';
  });
  if(!ttsEnabled) window.speechSynthesis?.cancel();
}

// ══ 语音识别 ══════════════════════════════════════════════
function toggleMic(target){
  if(isListening){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('请使用Chrome浏览器以支持语音输入。');return;}
  micTarget=target;
  recognition=new SR();
  recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=true;
  const micBtn=document.getElementById(target+'-mic');
  const inputEl=document.getElementById(target+'-input');
  const tipEl=document.getElementById(target+'-tip');

  recognition.onstart=()=>{
    isListening=true; micBtn.classList.add('listening'); micBtn.textContent='⏹';
    if(tipEl) tipEl.textContent='🔴 正在听...说完会自动停止';
    window.speechSynthesis?.cancel();
  };
  recognition.onresult=(e)=>{
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    inputEl.value=final||interim;
  };
  recognition.onend=()=>{
    isListening=false; micBtn.classList.remove('listening'); micBtn.textContent='🎤';
    if(tipEl) tipEl.textContent='点🎤开始说话 · 或打字后按 Enter 发送';
    const text=inputEl.value.trim();
    if(text){if(target==='chat') sendChat(); else sendFree();}
  };
  recognition.onerror=(e)=>{
    isListening=false; micBtn.classList.remove('listening'); micBtn.textContent='🎤';
    if(e.error==='not-allowed') alert('请允许浏览器使用麦克风权限。');
  };
  recognition.start();
}
function stopMic(){if(recognition) recognition.stop();}

// ══ 学习记录 ══════════════════════════════════════════════
function renderRecords(){
  const total=records.length,avg=total?Math.round(records.reduce((s,r)=>s+r.score,0)/total):0,best=total?Math.max(...records.map(r=>r.score)):0;
  document.getElementById('stat-grid').innerHTML=[{num:total,label:'累计练习次数'},{num:avg,label:'平均评分'},{num:best,label:'最高评分'}]
    .map(s=>`<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
  if(!total){document.getElementById('records-list').innerHTML='<div class="empty">还没有练习记录，快去练习吧！🚀</div>';drawChart();return;}
  document.getElementById('records-list').innerHTML=records.map(r=>`
    <div class="record-item">
      <span style="font-size:20px;">${r.emoji||'🗣️'}</span>
      <div style="flex:1;font-size:14px;font-weight:500;">${r.scene}</div>
      <div style="font-size:12px;color:var(--text3);">${r.date}</div>
      <div class="record-score">${r.score}</div>
    </div>`).join('');
  drawChart();
}
function drawChart(){
  const canvas=document.getElementById('score-chart'),ctx=canvas.getContext('2d');
  const data=records.slice(0,20).reverse();
  const W=canvas.offsetWidth||600,H=140; canvas.width=W; canvas.height=H;
  const pad={t:10,r:10,b:30,l:30},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  if(!data.length) return;
  const scores=data.map(r=>r.score),mn=Math.min(...scores)-5,mx=Math.max(...scores)+5;
  const sy=s=>pad.t+ch-(s-mn)/(mx-mn)*ch,sx=i=>pad.l+(i/(data.length-1||1))*cw;
  ctx.strokeStyle='#e0ddd8';ctx.lineWidth=0.5;
  [0,.5,1].forEach(f=>{const y=pad.t+f*ch;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(mx-(mx-mn)*f),pad.l-4,y+4);});
  ctx.beginPath();ctx.strokeStyle='#185FA5';ctx.lineWidth=2;
  data.forEach((r,i)=>{i===0?ctx.moveTo(sx(i),sy(r.score)):ctx.lineTo(sx(i),sy(r.score));});ctx.stroke();
  data.forEach((r,i)=>{ctx.beginPath();ctx.arc(sx(i),sy(r.score),4,0,Math.PI*2);ctx.fillStyle='#185FA5';ctx.fill();
    if(data.length<=10){ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(r.score,sx(i),sy(r.score)-8);}});
}
function clearRecords(){if(confirm('确定清空所有学习记录？')){records=[];localStorage.removeItem('eq_records');renderRecords();}}

// ══ 词句库 ════════════════════════════════════════════════
function renderVocabPage(){renderPhraseTopics();selectPhraseTopic(0);}
function switchVocabTab(tab){
  document.querySelectorAll('.vocab-tab').forEach((t,i)=>t.classList.toggle('active',['phrases','saved'][i]===tab));
  document.getElementById('vocab-phrases').style.display=tab==='phrases'?'block':'none';
  document.getElementById('vocab-saved').style.display=tab==='saved'?'block':'none';
  if(tab==='saved') renderSavedVocab();
}
function renderPhraseTopics(){
  document.getElementById('phrase-topics').innerHTML=PHRASE_TOPICS.map((t,i)=>`
    <div class="phrase-topic-btn${i===curPhraseIdx?' active':''}" onclick="selectPhraseTopic(${i})">
      <div>${t.icon}</div><div class="phrase-topic-name">${t.name}</div>
    </div>`).join('');
}
function selectPhraseTopic(idx){
  curPhraseIdx=idx; renderPhraseTopics();
  const topic=PHRASE_TOPICS[idx];
  document.getElementById('phrase-topic-title').textContent=topic.icon+' '+topic.name;
  document.getElementById('phrase-count').textContent=topic.phrases.length+'个短语';
  const savedKeys=vocab.map(v=>v.en);
  document.getElementById('phrase-list').innerHTML=topic.phrases.map(p=>{
    const saved=savedKeys.includes(p.en);
    return `<div class="phrase-item">
      <div style="flex:1;"><div class="phrase-en">${p.en}</div><div class="phrase-cn">${p.cn}</div></div>
      <span class="phrase-save${saved?' saved':''}" onclick="togglePhraseSave(this,'${p.en.replace(/'/g,"\\'")}','${p.cn.replace(/'/g,"\\'")}')">
        ${saved?'★':'☆'}</span></div>`;}).join('');
}
function togglePhraseSave(el,en,cn){
  const idx=vocab.findIndex(v=>v.en===en);
  if(idx>=0){vocab.splice(idx,1);el.textContent='☆';el.classList.remove('saved');}
  else{vocab.unshift({en,cn,scene:'900串儿',ts:Date.now()});el.textContent='★';el.classList.add('saved');}
  localStorage.setItem('eq_vocab',JSON.stringify(vocab));
}
function renderSavedVocab(){
  if(!vocab.length){document.getElementById('vocab-list').innerHTML='<div class="empty">还没有收藏。在短语库点☆收藏，或练习时点「加入词句库」。📚</div>';return;}
  document.getElementById('vocab-list').innerHTML=vocab.map((v,i)=>`
    <div class="vocab-item">
      <div style="flex:1;"><div class="vocab-en">${v.en}</div>
      ${v.cn?`<div class="vocab-cn">${v.cn}</div>`:''}
      ${v.scene?`<div class="vocab-scene">来自：${v.scene}</div>`:''}</div>
      <span class="vocab-del" onclick="delVocab(${i})">×</span>
    </div>`).join('');
}
function addVocabManual(){
  const en=document.getElementById('vocab-en-input').value.trim(),cn=document.getElementById('vocab-cn-input').value.trim();
  if(!en) return;
  vocab.unshift({en,cn,scene:'手动添加',ts:Date.now()});
  localStorage.setItem('eq_vocab',JSON.stringify(vocab));
  document.getElementById('vocab-en-input').value=''; document.getElementById('vocab-cn-input').value='';
  renderSavedVocab();
}
function delVocab(i){vocab.splice(i,1);localStorage.setItem('eq_vocab',JSON.stringify(vocab));renderSavedVocab();}
function openVocabModal(){
  document.getElementById('modal-en').value=''; document.getElementById('modal-cn').value='';
  document.getElementById('vocab-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-en').focus(),100);
}
function closeVocabModal(){document.getElementById('vocab-modal').classList.remove('open');}
function saveVocabModal(){
  const en=document.getElementById('modal-en').value.trim(),cn=document.getElementById('modal-cn').value.trim();
  if(!en){alert('请输入英文表达');return;}
  vocab.unshift({en,cn,scene:curScene?.name||freeTopic||'对话练习',ts:Date.now()});
  localStorage.setItem('eq_vocab',JSON.stringify(vocab));
  closeVocabModal(); alert('✅ 已加入词句库！');
}

// ══ 辅助函数 ══════════════════════════════════════════════
function addMsg(type,text){
  const area=document.getElementById('chat-messages');
  const div=document.createElement('div'); div.className='bubble '+type; div.textContent=text;
  area.appendChild(div); area.scrollTop=area.scrollHeight; return div;
}
function addFreeMsg(type,text){
  const area=document.getElementById('free-messages');
  const div=document.createElement('div'); div.className='bubble '+type; div.textContent=text;
  area.appendChild(div); area.scrollTop=area.scrollHeight; return div;
}

async function callArk(system, messages){
  const resp=await fetch(ARK_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+ARK_API_KEY},
    body:JSON.stringify({model:ARK_ENDPOINT,max_tokens:500,
      messages:[{role:'system',content:system},...messages]})
  });
  const data=await resp.json();
  if(data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}
